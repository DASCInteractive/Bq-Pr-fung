<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test</title>
  <style>
    body { font-family: -apple-system, sans-serif; max-width: 500px; margin: 20px auto; padding: 0 16px; }
    h2 { font-size: 18px; margin-bottom: 16px; }
    .btn { display: block; width: 100%; padding: 12px; margin-bottom: 8px; border: 2px solid #ccc; border-radius: 8px; background: white; font-size: 14px; text-align: left; cursor: pointer; }
    .btn.correct { background: #d1fae5; border-color: #10b981; color: #065f46; }
    .btn.wrong { background: #fee2e2; border-color: #ef4444; color: #991b1b; }
    .btn.dim { background: #f9fafb; color: #999; }
    #feedback { margin-top: 16px; padding: 16px; border-radius: 8px; text-align: center; font-size: 20px; font-weight: bold; display: none; }
    #feedback.show { display: block; }
    #feedback.ok { background: #d1fae5; border: 2px solid #10b981; color: #065f46; }
    #feedback.nok { background: #fee2e2; border: 2px solid #ef4444; color: #991b1b; }
    #nextBtn { display: none; width: 100%; margin-top: 16px; padding: 12px; background: #2563eb; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; }
    #nextBtn.show { display: block; }
  </style>
</head>
<body>
  <h2 id="question">Welche Kündigungsfrist gilt während der Probezeit?</h2>
  <button class="btn" onclick="answer(0)">A) 1 Woche</button>
  <button class="btn" onclick="answer(1)">B) 2 Wochen</button>
  <button class="btn" onclick="answer(2)">C) 4 Wochen</button>
  <button class="btn" onclick="answer(3)">D) 6 Wochen</button>
  <div id="feedback"></div>
  <button id="nextBtn" onclick="location.reload()">Nächste Frage</button>

  <script>
    var correct = 1;
    var answered = false;

    function answer(i) {
      if (answered) return;
      answered = true;

      var btns = document.querySelectorAll('.btn');
      for (var b = 0; b < btns.length; b++) {
        if (b === correct) {
          btns[b].className = 'btn correct';
        } else if (b === i) {
          btns[b].className = 'btn wrong';
        } else {
          btns[b].className = 'btn dim';
        }
      }

      var fb = document.getElementById('feedback');
      if (i === correct) {
        fb.textContent = '✓ Richtig!';
        fb.className = 'show ok';
      } else {
        fb.textContent = '✗ Falsch! Richtig: B';
        fb.className = 'show nok';
      }
      fb.id = 'feedback';

      document.getElementById('nextBtn').className = 'show';
    }
  </script>
</body>
</html>
